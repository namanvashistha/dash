services:
  homeassistant:
    # Pinned: :stable currently ships 2026.7.x on Python 3.14, which deadlocks
    # at boot (ImportExecutor hang). 2026.6 is the last minor on Python 3.13.
    image: ghcr.io/home-assistant/home-assistant:2026.6
    container_name: homeassistant
    restart: unless-stopped
    volumes:
      - ./homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Kolkata
    expose:
      - "8123"
    networks: [caddy]
    labels:
      # http:// scheme is required — deploy.sh runs Caddy in HTTP-only mode
      # (auto_https=off) behind Cloudflare. Matches foodly/limedb/hyperbole.
      caddy: http://home.namanvashistha.com
      caddy.reverse_proxy: "{{upstreams 8123}}"

  glance:
    # Personal dashboard. Pin a tag once you know a good one; latest is low-risk
    # for glance (single Go binary), unlike HA above.
    image: glanceapp/glance:latest
    container_name: glance
    restart: unless-stopped
    volumes:
      - ./glance:/app/config
      # read-only docker socket → powers the docker-containers widget
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # host root → lets the server-stats widget read the HOST, not the container
      - /:/mnt/host:ro
    environment:
      - TZ=Asia/Kolkata
      # point gopsutil (server-stats) at the host's proc/sys/etc instead of the container's
      - HOST_PROC=/mnt/host/proc
      - HOST_SYS=/mnt/host/sys
      - HOST_ETC=/mnt/host/etc
      # optional — lifts GitHub's 60/hr anon limit for the repo/release widgets.
      # Empty default keeps Glance booting even when unset. Set it in a
      # gitignored .env in this dir (compose auto-reads it): GLANCE_GITHUB_TOKEN=ghp_...
      - GLANCE_GITHUB_TOKEN=${GLANCE_GITHUB_TOKEN:-}
      # optional — HA long-lived token for the Home Assistant bridge widget.
      # Empty default keeps Glance booting; set it in .env to enable.
      - HA_TOKEN=${HA_TOKEN:-}
    expose:
      - "8080"
    networks: [caddy]
    labels:
      caddy: http://dash.namanvashistha.com
      caddy.reverse_proxy: "{{upstreams 8080}}"

  # ---- Docmost: self-hosted collaborative wiki / docs ----
  # App container. Its Postgres + Redis live on the internal `docmost` network
  # below and are never exposed to caddy. Only this service is reverse-proxied.
  docmost:
    image: docmost/docmost:latest
    container_name: docmost
    restart: unless-stopped
    depends_on:
      - docmost-db
      - docmost-redis
    environment:
      # Public URL (https at Cloudflare) — Docmost builds absolute links from it.
      - APP_URL=https://docs.namanvashistha.com
      # Required. Long random secret — set in .env: openssl rand -hex 32
      - APP_SECRET=${DOCMOST_APP_SECRET}
      - DATABASE_URL=postgresql://docmost:docmost@docmost-db:5432/docmost?schema=public
      - REDIS_URL=redis://docmost-redis:6379
      - TZ=Asia/Kolkata
    volumes:
      # uploaded attachments / avatars (DB holds the docs themselves)
      - docmost-storage:/app/data/storage
    expose:
      - "3000"
    # on caddy (for the reverse proxy) AND docmost (to reach db/redis)
    networks: [caddy, docmost]
    labels:
      # http:// scheme required — Caddy runs auto_https=off behind Cloudflare
      caddy: http://docs.namanvashistha.com
      caddy.reverse_proxy: "{{upstreams 3000}}"

  docmost-db:
    image: postgres:16-alpine
    container_name: docmost-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=docmost
      - POSTGRES_USER=docmost
      - POSTGRES_PASSWORD=docmost
      - TZ=Asia/Kolkata
    volumes:
      - docmost-db:/var/lib/postgresql/data
    networks: [docmost]

  docmost-redis:
    image: redis:7-alpine
    container_name: docmost-redis
    restart: unless-stopped
    volumes:
      - docmost-redis:/data
    networks: [docmost]

networks:
  caddy:
    external: true
  # backend-only network for Docmost's db/redis — internal:true keeps it off
  # the host/internet; the app reaches out via the caddy network instead.
  docmost:
    internal: true

volumes:
  docmost-storage:
  docmost-db:
  docmost-redis:
