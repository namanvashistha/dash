services:
  homeassistant:
    # Pinned: :stable currently ships 2026.7.x on Python 3.14, which deadlocks
    # at boot (ImportExecutor hang). 2026.6 is the last minor on Python 3.13.
    image: ghcr.io/home-assistant/home-assistant:2026.6
    container_name: homeassistant
    restart: unless-stopped
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Kolkata
    expose:
      - "8123"
    networks: [caddy]
    labels:
      # http:// scheme is required — deploy.sh runs Caddy in HTTP-only mode
      # (auto_https=off) behind Cloudflare. Matches foodly/limedb/hyperbole.
      caddy: http://home.namanvashistha.com
      caddy.reverse_proxy: "{{upstreams 8123}}"

networks:
  caddy:
    external: true
