pages:
  - name: Home
    columns:
      # ---- left rail: time + weather ----
      - size: small
        widgets:
          - type: calendar
            first-day-of-week: monday

          - type: weather
            # geocoded via open-meteo, no API key. Change to your city.
            location: Bengaluru, India
            units: metric
            hour-format: 24h

          - type: server-stats
            servers:
              - type: local
                name: Homelab
                # disk lives at the host mount (see docker-compose HOST_* setup)
                mountpoints:
                  "/":
                    hide: true
                  "/mnt/host":
                    name: Disk

      # ---- center: services status + feeds ----
      - size: full
        widgets:
          - type: monitor
            title: My Services
            cache: 1m
            sites:
              - title: Home Assistant
                url: https://home.namanvashistha.com
                icon: si:homeassistant
              - title: Chess
                url: https://chess.namanvashistha.com
              - title: Foodly
                url: https://foodly.namanvashistha.com
              - title: LimeDB
                url: https://limedb.namanvashistha.com
              - title: Hyperbole
                url: https://hyperbole.namanvashistha.com

          - type: rss
            title: My Microblog
            limit: 10
            feeds:
              - url: https://namanvashistha.com/rss.xml
                title: namanvashistha.com

          - type: hacker-news

      # ---- right rail: infra + releases ----
      - size: small
        widgets:
          # Live LimeDB data via the web frontend's proxy → node1:8484/api/v1
          - type: custom-api
            title: LimeDB Nodes
            cache: 30s
            url: https://limedb.namanvashistha.com/api/proxy/cluster/state
            template: |
              {{ range .JSON.Array "activeNodes" }}
              <div class="flex justify-between">
                <span>{{ .String "node_url" }}</span>
                {{ if eq (.String "liveness") "alive" }}
                <span class="color-positive">alive</span>
                {{ else }}
                <span class="color-negative">{{ .String "liveness" }}</span>
                {{ end }}
              </div>
              {{ end }}

          - type: custom-api
            title: LimeDB Stats
            cache: 30s
            url: https://limedb.namanvashistha.com/api/proxy/health
            template: |
              <div class="flex justify-between size-h3">
                <span>Status</span>
                <span class="color-positive">{{ .JSON.String "status" }}</span>
              </div>
              <div class="flex justify-between color-subdue">
                <span>Keys</span>
                <span>{{ .JSON.Int "storage.approx_total_keys" }}</span>
              </div>
              <div class="flex justify-between color-subdue">
                <span>Req/s</span>
                <span>{{ printf "%.2f" (.JSON.Float "requests_per_second") }}</span>
              </div>
              <div class="flex justify-between color-subdue">
                <span>Avg latency</span>
                <span>{{ printf "%.2f" (.JSON.Float "average_latency_ms") }}ms</span>
              </div>
              <div class="flex justify-between color-subdue">
                <span>Memory</span>
                <span>{{ printf "%.0f" (.JSON.Float "memory_allocated_mb") }}MB</span>
              </div>

          - type: docker-containers
            # reads the read-only socket mounted in docker-compose.yml
            hide-by-default: false

          - type: releases
            repositories:
              - glanceapp/glance
              - home-assistant/core
